omOut、atomNew 3. 增加发布订阅机制用来传递 product 4. 实际上 atom 的来源又将防女巫引向了 pow 2. 再依据中本聪对这个系统的描述，这里atom就是中本聪对于比特币应用的", "is_question": true, "is_deep_question": false, "date": "2026-02-02T00:09:30-08:00", "email": "chenmoonmo@gmail.com", "answered": true}, {"person": "文博", "month": "2025-12", "subject": "=?UTF-8?Q?Re:_=E5=B9=BF=E6=92=AD=E6=96=B0nonce:=E5=B9=BF?=\r\n =?UTF-8?Q?=E6=92=AD=E5=92=8Cp2pmarket=E7=9A=84=E5=85=B3=E7=B3=BB?=", "body": "这个传递的逻辑是这样的，但是我想讲的部分是，A->B->C 在 A 评论 B 之后，B 评论 C，这个过程会有一个原子的转移，但是当原子在 atomNew的数量大于流限制，转移到 atomOut 的时候，会有一个随机选择，而这个随机函数因为", "body_preview": "这个传递的逻辑是这样的，但是我想讲的部分是，A->B->C 在 A 评论 B 之后，B 评论 C，这个过程会有一个原子的转移，但是当原子在 atomNew的数量大于流限制，转移到 atomOut 的时候，会有一个随机选择，而这个随机函数因为执行在不同的机器上，其随机来源不同，因此可能选择的不同的原子加入 atomOut，而当 B 再次评论时，将其的 atomOut 复制给 C，那么在 C 进行去重", "is_question": false, "is_deep_question": false, "date": "2025-12-31T00:20:43-08:00", "email": "chenmoonmo@gmail.com", "answered": null}, {"person": "文博", "month": "2025-12", "subject": "=?UTF-8?Q?Re:_NONCE_=E5=88=9B=E4=B8=96=E5=8E=9F?=\r\n =?UTF-8?Q?=E5=AD=90=EF=BC=8CGenesis_Atom?=", "body": "比特币 market 部分代码，实际上存在一个因为随机的使用而带来的不一致问题，在第一次传播时，会产生进入 atomOut 原子不一致的问题，而第二次传播时，则会因为 atomOut 带来评价实际的影响力在不同节点表现不同的问题。 首先在 ", "body_preview": "比特币 market 部分代码，实际上存在一个因为随机的使用而带来的不一致问题，在第一次传播时，会产生进入 atomOut 原子不一致的问题，而第二次传播时，则会因为 atomOut 带来评价实际的影响力在不同节点表现不同的问题。 首先在 market 部分，原子随着评论进行广播，当节点接收到某条评论时，他会在本地的用户数据库中查询评论发送人的 vAtomsOut，然后将其传递给 AddAtoms", "is_question": false, "is_deep_question": false, "date": "2025-12-30T21:38:25-08:00", "email": "chenmoonmo@gmail.com", "answered": null}, {"person": "文博", "month": "2026-01", "subject": "=?UTF-8?B?UmU6IOivt+axguWQjOatpeWRqOS4gOS8muiuruWGheWuuQ==?=", "body": "1. 比特币和atom都作为中本聪设计的产品，其具有一定相似性，对这种相似性做一个映射，叶鹏描述了一套映射的模型，首先将比特币中的几种交易类型，没有out的交易、coinbase 的交易、用户发起的交易类比为几种特殊的atom，零原子，原点", "body_preview": "1. 比特币和atom都作为中本聪设计的产品，其具有一定相似性，对这种相似性做一个映射，叶鹏描述了一套映射的模型，首先将比特币中的几种交易类型，没有out的交易、coinbase 的交易、用户发起的交易类比为几种特殊的atom，零原子，原点原子，普通原子，同时将比特币的节点接受、存储和转发交易的行为类比为market中的Cuser数据对atom进行接收、暂存和流转。这套类 const CONCEPT_RANGES = {"consensus/BitDNS与P2P市场": {"first": "2025-11", "last": "2026-04", "count": 52}, "atom/Atom与Bitcoin关系": {"first": "2025-11", "last": "2026-04", "count": 126}, "atom/谓词": {"first": "2026-02", "last": "2026-03", "count": 26}, "broadcast/中间会面机制": {"first": "2026-01", "last": "2026-03", "count": 28}, "ai/自驱系统": {"first": "2026-02", "last": "2026-02", "count": 2}, "atom/Atom是什么": {"first": "2025-12", "last": "2026-04", "count": 86}, "consensus/难度调整": {"first": "2025-11", "last": "2026-04", "count": 51}, "consensus/元胞自动机": {"first": "2026-02", "last": "2026-03", "count": 5}, "atom/Atom流转机制": {"first": "2026-01", "last": "2026-01", "count": 2}, "atom/Atom数据结构": {"first": "2026-01", "last": "2026-04", "count": 21}, "broadcast/洪泛atom的激励问题": {"first": "2025-12", "last": "2026-03", "count": 14}, "atom/创世Atom与nonce": {"first": "2025-12", "last": "2026-03", "count": 6}, "broadcast/节点与SPV轻节点": {"first": "2025-11", "last": "2026-04", "count": 11}, "atom/脚本是谓词": {"first": "2026-03", "last": "2026-03", "count": 2}, "broadcast/发布订阅机制": {"first": "2026-02", "last": "2026-02", "count": 9}, "security/预信任节点": {"first": "2026-01", "last": "2026-02", "count": 5}, "market/匹配系统": {"first": "2026-02", "last": "2026-02", "count": 1}, "atom/双花问题": {"first": "2025-11", "last": "2025-11", "count": 1}};
const MONTHS = ["2025-11","2025-12","2026-01","2026-02","2026-03","2026-04"];
let activeMonth = null;
const catColors = {
  'people': '#feca57',"atom": "#e94560", "consensus": "#0f9b8e", "broadcast": "#9b59b6", "market": "#f39c12", "ai": "#3498db", "security": "#e67e22", "math": "#1abc9c", "meeting": "#95a5a6"};
const catOrder = ["atom", "consensus", "broadcast", "meeting", "market", "ai", "security", "math"];

// Build adjacency FIRST, before forceLink touches anything
const outLinks = {};
const inLinks = {};
DATA.nodes.forEach(n => { outLinks[n.id] = []; inLinks[n.id] = []; });
DATA.links.forEach(l => {
  // Handle all three possible types of source/target: number (index), object (node), or string (id)
  const s = typeof l.source === 'number' ? DATA.nodes[l.source]?.id : (l.source?.id || l.source);
  const t = typeof l.target === 'number' ? DATA.nodes[l.target]?.id : (l.target?.id || l.target);
  outLinks[s] = outLinks[s] || [];
  inLinks[t] = inLinks[t] || [];
  outLinks[s].push(t);
  inLinks[t].push(s);
});

// Convert ALL link source/target to string IDs before simulation
DATA.links.forEach(l => {
  if (typeof l.source === 'object') l.source = l.source.id;
  if (typeof l.target === 'object') l.target = l.target.id;
  if (typeof l.source === 'number') l.source = DATA.nodes[l.source]?.id || l.source;
  if (typeof l.target === 'number') l.target = DATA.nodes[l.target]?.id || l.target;
});

const container = document.getElementById('graph-container');
const W = window.innerWidth;
const H = window.innerHeight - 52;
const width = W;
const height = H;

// Simulation
// Render label: concept name + participant chips
function renderLabel(el, d) {
  el.selectAll('*').remove();
  el.append('tspan').text(d.name).attr('x', 0).attr('dy', 0).attr('text-anchor', 'middle');
  if (d.people && d.people.length > 0) {
    const names = d.people.slice(0, 5).join('·');
    el.append('tspan').text(names).attr('x', 0).attr('dy', '1.1em')
      .attr('text-anchor', 'middle').attr('fill', '#feca57').attr('font-size', '8px').attr('opacity', 0.85);
  }
}

simulation = d3.forceSimulation(DATA.nodes)
  .force('link', d3.forceLink(DATA.links).id(d => d.id).distance(90).strength(0.4))
  .force('charge', d3.forceManyBody().strength(-280))
  .force('center', d3.forceCenter(W / 2, H / 2))
  .force('collision', d3.forceCollide(18))
  .alphaDecay(0.028);

const svg = d3.select('#graph-container').append('svg')
  .attr('width', W)
  .attr('height', H);

const g = svg.append('g');

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 4])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);
svg.on('dblclick.zoom', null);

// Links
const link = g.append('g').selectAll('line')
  .data(DATA.links)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', 'rgba(255,255,255,0.1)');

// Node groups
const node = g.append('g').selectAll('g')
  .data(DATA.nodes)
  .join('g')
  .attr('class', 'node-group')
  .call(d3.drag()
    .on('start', (e, d) => {
      if (!e.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => {
      if (!e.active) simulation.alphaTarget(0);
      d.fx = null; d.fy = null;
    }));

// Circles
const circle = node.append('circle')
  .attr('r', d => {
    const conn = (outLinks[d.id]?.length || 0) + (inLinks[d.id]?.length || 0);
    return 8 + Math.min(conn * 1.5, 14);
  })
  .attr('fill', d => d.color)
  .attr('opacity', 0.85);

// Labels (only show for high-degree nodes by default)
const label = node.append('text')
  .text(d => d.name)
  .attr('text-anchor', 'middle')
  .attr('dy', d => {
    const conn = (outLinks[d.id]?.length || 0) + (inLinks[d.id]?.length || 0);
    return 8 + Math.min(conn * 1.5, 14) + 12;
  })
  .style('font-size', '10px')
  .style('fill', '#8b949e')
  .style('pointer-events', 'none');

// Click to open panel
node.on('click', (e, d) => {
  e.stopPropagation();
  if (d.category === 'people') {
    window.open(d.url, '_blank');
  } else {
    openPanel(d);
  }
});

// Click background to close
svg.on('click', () => closePanel());

// Tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Panel
function openPanel(d) {
  document.getElementById('panel').classList.add('active');
  document.getElementById('panel-title').textContent = d.name;
  document.getElementById('panel-cat').textContent = d.category;
  document.getElementById('panel-cat').style.background = d.color + '33';
  document.getElementById('panel-cat').style.color = d.color;
  document.getElementById('panel-subject').textContent = d.subject || '—';

  const bl = document.getElementById('panel-backlinks');
  const ol = document.getElementById('panel-links');
  bl.innerHTML = '';
  ol.innerHTML = '';

  const inL = inLinks[d.id] || [];
  const outL = outLinks[d.id] || [];

  if (inL.length === 0) bl.innerHTML = '<div class="link-item empty">暂无反向引用</div>';
  inL.forEach(tid => {
    const n = DATA.nodes.find(x => x.id === tid);
    if (!n) return;
    bl.innerHTML += `<div class="link-item" onclick="jumpTo('${n.id}')"><span class="dot" style="background:${n.color}"></span><a href="${n.url}">${n.name}</a><span style="color:#8b949e;font-size:10px;margin-left:auto">in ${n.category}</span></div>`;
  });

  if (outL.length === 0) ol.innerHTML = '<div class="link-item empty">暂无引用</div>';
  outL.forEach(tid => {
    const n = DATA.nodes.find(x => x.id === tid);
    if (!n) return;
    ol.innerHTML += `<div class="link-item" onclick="jumpTo('${n.id}')"><span class="dot" style="background:${n.color}"></span><a href="${n.url}">${n.name}</a><span style="color:#8b949e;font-size:10px;margin-left:auto">in ${n.category}</span></div>`;
  });

  // Highlight
  circle.attr('opacity', d => {
    if (d.id === d.id || inL.includes(d.id) || outL.includes(d.id)) return 1;
    return 0.2;
  });
  link.attr('stroke', l => {
    const s = l.source.id || l.source;
    const t = l.target.id || l.target;
    if (s === d.id || t === d.id) return 'rgba(233,69,96,0.5)';
    return 'rgba(255,255,255,0.04)';
  }).attr('stroke-width', l => {
    const s = l.source.id || l.source;
    const t = l.target.id || l.target;
    return (s === d.id || t === d.id) ? 2 : 1;
  });
}

function closePanel() {
  document.getElementById('panel').classList.remove('active');
  circle.attr('opacity', 0.85);
  link.attr('stroke', 'rgba(255,255,255,0.1)').attr('stroke-width', 1);
}

window.jumpTo = function(id) {
  const n = DATA.nodes.find(x => x.id === id);
  if (n) {
    openPanel(n);
    // Center view on node
    svg.transition().duration(500).call(
      zoom.transform,
      d3.zoomIdentity.translate(width/2 - n.x, height/2 - n.y)
    );
  }
};

// Reset button
document.getElementById('btn-reset').onclick = () => {
  simulation.alpha(0.8).restart();
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  closePanel();
};

// Show all
document.getElementById('btn-all').onclick = () => {
  closePanel();
  circle.attr('opacity', 0.85);
  label.each(function(d) { renderLabel(d3.select(this), d); });
};

// Search
const searchInput = document.getElementById('search');
searchInput.oninput = () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    circle.attr('opacity', 0.85);
    label.each(function(d) { renderLabel(d3.select(this), d); d3.select(this).style('opacity', 1); });
    return;
  }
  circle.attr('opacity', d => {
    const match = d.name.toLowerCase().includes(q) || (d.subject && d.subject.toLowerCase().includes(q));
    return match ? 1 : 0.08;
  });
  label.each(function(d) {
    const match = d.name.toLowerCase().includes(q) || (d.subject && d.subject.toLowerCase().includes(q));
    if (match) { renderLabel(d3.select(this), d); d3.select(this).style('opacity', 1); }
    else { d3.select(this).selectAll('*').remove(); }
  });
};

// Legend
const legendEl = document.getElementById('legend-items');
catOrder.forEach(cat => {
  const count = DATA.nodes.filter(n => n.category === cat).length;
  if (count === 0) return;
  const color = catColors[cat];
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${cat} (${count})`;
  item.onclick = () => {
    const others = DATA.nodes.filter(n => n.category !== cat);
    circle.attr('opacity', d => d.category === cat ? 1 : 0.08);
    label.each(function(d) { if (d.category === cat) { renderLabel(d3.select(this), d); } else { d3.select(this).selectAll('*').remove(); } });
  };
  legendEl.appendChild(item);
});

// Stats
document.getElementById('stat-nodes').textContent = DATA.nodes.length;
document.getElementById('stat-links').textContent = DATA.links.length;

// Center initially
svg.call(zoom.transform, d3.zoomIdentity.translate(width*0.05, height*0.05).scale(0.85));


// Filter by category
function filterCategory(cat) {
  if (cat === 'people') {
    // Show person nodes + their connected concept nodes
    const personIds = DATA.nodes.filter(n => n.category === 'people').map(n => n.id);
    const connectedIds = new Set();
    personIds.forEach(pid => connectedIds.add(pid));
    DATA.links.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (personIds.includes(s)) connectedIds.add(t);
      if (personIds.includes(t)) connectedIds.add(s);
    });
    circle.attr('opacity', d => connectedIds.has(d.id) ? 1 : 0.08);
    label.each(function(d) { if (connectedIds.has(d.id)) { renderLabel(d3.select(this), d); } else { d3.select(this).selectAll('*').remove(); } });
  } else {
    circle.attr('opacity', d => d.category === cat ? 1 : 0.08);
    label.each(function(d) { if (d.category === cat) { renderLabel(d3.select(this), d); } else { d3.select(this).selectAll('*').remove(); } });
  }
}

// Time filter
function buildTimeFilter() {
  var tf = document.getElementById('time-filter');
  if (!tf) return;
  var allBtn = document.createElement('button');
  allBtn.className = 'month-btn all-btn active';
  allBtn.textContent = '全部';
  allBtn.onclick = function() { setMonth(null); };
  tf.appendChild(allBtn);
  MONTHS.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'month-btn';
    var label = m.replace('2025-', '25/').replace('2026-', '26/');
    btn.textContent = label;
    btn.dataset.month = m;
    btn.onclick = function() { setMonth(m); };
    tf.appendChild(btn);
  });
}

function setMonth(month) {
  activeMonth = month;
  document.querySelectorAll('.month-btn').forEach(function(b) { b.classList.remove('active'); });
  if (month === null) {
    document.querySelector('.all-btn').classList.add('active');
  } else {
    var b = document.querySelector('[data-month="'+month+'"]');
    if (b) b.classList.add('active');
  }
  // Fade nodes by month
  d3.selectAll('circle').each(function(d) {
    if (!d || !d.id) return;
    var r = CONCEPT_RANGES[d.id];
    var faded = (activeMonth !== null) && (!r || r.first > activeMonth || r.last < activeMonth);
    d3.select(this).classed('node-faded', faded);
  });
  d3.selectAll('line').each(function(d) {
    if (!d || !d.source || !d.target) return;
    var src = typeof d.source === 'object' ? d.source.id : d.source;
    var tgt = typeof d.target === 'object' ? d.target.id : d.target;
    var srcR = CONCEPT_RANGES[src], tgtR = CONCEPT_RANGES[tgt];
    var faded = (activeMonth !== null) && (!srcR || !tgtR || srcR.first > activeMonth || srcR.last < activeMonth || tgtR.first > activeMonth || tgtR.last < activeMonth);
    d3.select(this).classed('node-faded', faded).style('opacity', faded ? 0.02 : null);
  });
}

// Discussion panel
function showDiscussions(nodeId) {
  var msgs = DISCUSSION_DATA[nodeId] || [];
  var node = DATA.nodes.find(function(n) { return n.id === nodeId; });
  
  var titleEl = document.getElementById('panel-title');
  var catTag = document.querySelector('#panel-header .cat-tag');
  var backlinksEl = document.getElementById('panel-backlinks');
  var outlinksEl = document.getElementById('panel-links');
  
  if (titleEl) titleEl.textContent = node ? node.name : nodeId;
  if (catTag) catTag.textContent = node ? node.category : '';
  
  // Participant chips
  var personCount = {};
  msgs.forEach(function(m) { personCount[m.person] = (personCount[m.person] || 0) + 1; });
  var chipsHtml = Object.entries(personCount)
    .sort(function(a,b){ return b[1]-a[1]; })
    .map(function(e){ return '<span class="person-chip" onclick="showPersonDiscussions(\''+nodeId+'\',\''+e[0]+'\')">'+e[0]+' ('+e[1]+')</span>'; })
    .join('');
  
  // Discussion items
  var discHtml = '<div style="margin-top:12px;"><div class="person-list" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">'+chipsHtml+'</div>';
  discHtml += '<div style="border-top:1px solid #30363d;padding-top:10px;">';
  
  msgs.slice(0, 15).forEach(function(m) {
    var qBadge = '';
    if (m.is_question) {
      qBadge = m.answered ? '<span class="q-badge answered">已回复</span>' : '<span class="q-badge open">待回复</span>';
    }
    var body = m.body.length > 250 ? m.body.substring(0,250)+'...' : m.body;
    body = body.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    discHtml += '<div class="disc-item"><div class="di-header"><span class="di-person">'+m.person+'</span><span>'+qBadge+'<span class="di-meta">'+m.month+'</span></span></div><div class="di-body">'+body+'</div></div>';
  });
  
  discHtml += '</div></div>';
  if (node) {
    discHtml += '<div style="margin-top:12px;text-align:center;"><a href="'+node.url+'" class="btn" style="text-decoration:none;display:inline-block;text-align:center;padding:6px 14px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:6px;font-size:12px;">→ 打开概念页面</a></div>';
  }
  
  if (backlinksEl) backlinksEl.innerHTML = discHtml;
  if (outlinksEl) outlinksEl.innerHTML = '';
  var panel = document.getElementById('panel');
  if (panel) panel.style.display = 'block';
}

function showPersonDiscussions(nodeId, person) {
  var msgs = (DISCUSSION_DATA[nodeId] || []).filter(function(m) { return m.person === person; });
  var node = DATA.nodes.find(function(n) { return n.id === nodeId; });
  
  var titleEl = document.getElementById('panel-title');
  var catTag = document.querySelector('#panel-header .cat-tag');
  
  if (titleEl) titleEl.textContent = (node ? node.name : nodeId) + ' — ' + person;
  if (catTag) catTag.textContent = person;
  
  var discHtml = '<div style="border-top:1px solid #30363d;padding-top:10px;">';
  msgs.forEach(function(m) {
    var qBadge = '';
    if (m.is_question) {
      qBadge = m.answered ? '<span class="q-badge answered">已回复</span>' : '<span class="q-badge open">待回复</span>';
    }
    var body = m.body.length > 400 ? m.body.substring(0,400)+'...' : m.body;
    body = body.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    discHtml += '<div class="disc-item"><div class="di-header"><span class="di-person">'+m.person+'</span><span>'+qBadge+'<span class="di-meta">'+m.month+'</span></span></div><div class="di-body">'+body+'</div></div>';
  });
  discHtml += '</div>';
  
  var backlinksEl = document.getElementById('panel-backlinks');
  var outlinksEl = document.getElementById('panel-links');
  if (backlinksEl) backlinksEl.innerHTML = discHtml;
  if (outlinksEl) outlinksEl.innerHTML = '';
  var panel = document.getElementById('panel');
  if (panel) panel.style.display = 'block';
}
