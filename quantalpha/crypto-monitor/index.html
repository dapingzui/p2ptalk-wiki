<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Structure Terminal</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Crypto Structure Terminal</h1>
        <p class="sub">BTC 微观结构终端, K线 + 成交流 + OI/Funding + State Engine</p>
      </div>
      <div class="actions">
        <select id="intervalSelect">
          <option value="1m">1m</option>
          <option value="5m" selected>5m</option>
          <option value="15m">15m</option>
          <option value="1h">1h</option>
        </select>
        <button id="refreshBtn">刷新结构</button>
        <span id="statusBadge" class="badge neutral">加载中</span>
      </div>
    </header>

    <main class="terminal-grid">
      <section class="card chart-card">
        <div class="section-head">
          <h2>BTC K线</h2>
          <div id="priceLine" class="inline-metrics"></div>
        </div>
        <div id="chart" class="chart"></div>
      </section>

      <section class="card flow-card">
        <div class="section-head">
          <h2>订单流 / 最近成交</h2>
          <div id="tapeStats" class="inline-metrics"></div>
        </div>
        <div id="tradeTape" class="trade-tape"></div>
      </section>

      <section class="card lower-card">
        <div class="section-head">
          <h2>OI / Funding</h2>
          <div id="curveStats" class="inline-metrics"></div>
        </div>
        <div class="mini-grid">
          <div>
            <div class="mini-title">Open Interest</div>
            <div id="oiChart" class="mini-chart"></div>
          </div>
          <div>
            <div class="mini-title">Funding</div>
            <div id="fundingChart" class="mini-chart"></div>
          </div>
        </div>
      </section>

      <section class="card state-card">
        <div class="section-head">
          <h2>结构判断</h2>
          <div id="timestamp" class="inline-metrics"></div>
        </div>
        <div class="state-box">
          <div>
            <div class="label">当前状态</div>
            <div id="stateName" class="state">-</div>
            <div id="actionBias" class="muted">-</div>
          </div>
          <div class="hero-stats">
            <div><span class="label">风险</span><strong id="riskLevel">-</strong></div>
            <div><span class="label">置信度</span><strong id="confidence">-</strong></div>
          </div>
        </div>

        <div class="metrics two-col compact">
          <div class="metric"><span>Price</span><strong id="price">-</strong></div>
          <div class="metric"><span>Funding</span><strong id="funding">-</strong></div>
          <div class="metric"><span>OI</span><strong id="oi">-</strong></div>
          <div class="metric"><span>Sources</span><strong id="sources">-</strong></div>
          <div class="metric"><span>Long Liq 24h</span><strong id="longLiq">-</strong></div>
          <div class="metric"><span>Short Liq 24h</span><strong id="shortLiq">-</strong></div>
        </div>

        <div class="panel-block">
          <div class="mini-title">Structure Metrics</div>
          <div class="metrics two-col compact" id="structureMetrics"></div>
        </div>

        <div class="panel-block">
          <div class="mini-title">Tags</div>
          <div id="tags" class="tags"></div>
        </div>

        <div class="panel-block">
          <div class="mini-title">Raw Report</div>
          <pre id="rawReport" class="report"></pre>
        </div>
      </section>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
