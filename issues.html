<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题追踪 — P2PTalk Wiki</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --red: #f85149;
    --yellow: #d29922;
    --green: #3fb950;
    --blue: #58a6ff;
    --red-bg: rgba(248,81,73,0.1);
    --yellow-bg: rgba(210,153,34,0.1);
    --green-bg: rgba(63,185,80,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem;
    max-width: 900px;
    margin: 0 auto;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back {
    display: inline-flex; align-items: center; gap: 0.4rem;
    color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem;
  }
  .back:hover { color: var(--text); text-decoration: none; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.3rem; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .stats {
    display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .stat {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.8rem;
    border-radius: 6px; font-size: 0.85rem; font-weight: 500;
  }
  .stat-red { background: var(--red-bg); color: var(--red); }
  .stat-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .stat-green { background: var(--green-bg); color: var(--green); }
  .filters {
    display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 0.35rem 0.9rem;
    border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    cursor: pointer; font-size: 0.82rem;
    transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--muted); }
  .filter-btn.active-red { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .filter-btn.active-yellow { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .filter-btn.active-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .filter-btn.active-all { background: var(--surface); color: var(--text); border-color: var(--text); }
  .issue-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .issue-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.1rem;
    transition: border-color 0.15s;
  }
  .issue-card:hover { border-color: var(--muted); }
  .issue-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.4rem; }
  .issue-emoji { font-size: 1.1rem; }
  .issue-category {
    font-size: 0.72rem; padding: 0.15rem 0.5rem;
    border-radius: 12px; background: rgba(88,166,255,0.1);
    color: var(--blue); font-weight: 500;
  }
  .issue-subject {
    font-size: 0.72rem; color: var(--muted); margin-left: auto;
  }
  .issue-question {
    font-size: 0.9rem; color: var(--text); margin-left: 1.7rem;
  }
  .issue-link {
    font-size: 0.78rem; color: var(--muted); margin-left: 1.7rem; margin-top: 0.3rem;
    display: inline-block;
  }
  .issue-link:hover { color: var(--blue); }
  .empty {
    text-align: center; padding: 3rem; color: var(--muted);
    font-size: 0.9rem;
  }
  .section-title {
    font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted);
    margin: 1.5rem 0 0.75rem;
    padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<a class="back" href="index.html">← 返回总览</a>

<h1>🔴 问题追踪面板</h1>
<p class="subtitle">追踪 P2PTalk 知识图谱中的开放问题</p>

<div class="stats">
  <div class="stat stat-red">🔴 未解答 <span id="count-red">4</span></div>
  <div class="stat stat-yellow">🟡 待确认 <span id="count-yellow">0</span></div>
  <div class="stat stat-green">🟢 已确立 <span id="count-green">0</span></div>
</div>

<div class="filters">
  <button class="filter-btn active-all" data-filter="all" onclick="setFilter('all')">全部</button>
  <button class="filter-btn" data-filter="🔴" onclick="setFilter('🔴')">🔴 未解答</button>
  <button class="filter-btn" data-filter="🟡" onclick="setFilter('🟡')">🟡 待确认</button>
  <button class="filter-btn" data-filter="🟢" onclick="setFilter('🟢')">🟢 已确立</button>
</div>

<div class="issue-list" id="issue-list"></div>

<script>
const issues = [
  { status: "🔴", question: "Atom 的精确定义到底是什么？", subject: "Atom是什么", category: "atom", link: "concepts/atom/Atom是什么.html" },
  { status: "🔴", question: "Atom 是信号还是声明？两者区别是什么？", subject: "Atom是什么", category: "atom", link: "concepts/atom/Atom是什么.html" },
  { status: "🔴", question: "如果 Atom 不进 Mempool，它存在哪里？", subject: "Atom是什么", category: "atom", link: "concepts/atom/Atom是什么.html" },
  { status: "🔴", question: "Atom 如何参与共识？", subject: "Atom是什么", category: "atom", link: "concepts/atom/Atom是什么.html" },
];

let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = 'filter-btn';
    if (btn.dataset.filter === f) {
      btn.classList.add(f === '🔴' ? 'active-red' : f === '🟡' ? 'active-yellow' : f === '🟢' ? 'active-green' : 'active-all');
    }
  });
  render();
}

function render() {
  const list = document.getElementById('issue-list');
  const filtered = currentFilter === 'all' ? issues : issues.filter(i => i.status === currentFilter);
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">暂无此类问题</div>';
    return;
  }
  
  list.innerHTML = filtered.map(i => `
    <div class="issue-card">
      <div class="issue-header">
        <span class="issue-emoji">${i.status}</span>
        <span class="issue-category">${i.category}</span>
        <span class="issue-subject">${i.subject}</span>
      </div>
      <div class="issue-question">${i.question}</div>
      <a class="issue-link" href="${i.link}">→ 查看概念页</a>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
